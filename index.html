<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DKL — Unified Operations & AI Intelligence Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0e13;color:#e2e8f0;font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.top-nav{height:42px;background:#111520;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:9999;flex-shrink:0}
.top-nav .brand{display:flex;align-items:center;gap:8px}
.top-nav .logo{width:28px;height:28px;background:linear-gradient(135deg,#f97316,#c66a20);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;color:#fff;font-family:'IBM Plex Mono',monospace}
.top-nav h1{font-size:13px;font-weight:700;color:#fff}
.top-nav h1 span{color:#6b7280;font-weight:400;font-size:11px}
.view-tabs{display:flex;gap:4px;margin-left:24px}
.view-tab{padding:6px 16px;font-size:10px;font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:5px;color:#6b7280;cursor:pointer;transition:.15s}
.view-tab:hover{border-color:#f97316;color:#e2e8f0}
.view-tab.active{background:rgba(249,115,22,.1);border-color:#f97316;color:#f97316}
.view-container{flex:1;position:relative;overflow:hidden}
.view-frame{position:absolute;inset:0;border:none;width:100%;height:100%;display:none}
.view-frame.active{display:block}
iframe{width:100%;height:100%;border:none}
</style>
</head>
<body>
<div class="top-nav">
<div class="brand">
<div class="logo">DKL</div>
<h1>Delek Logistics <span>— Unified Operations Platform</span></h1>
</div>
<div class="view-tabs">
<div class="view-tab active" onclick="switchView('map',this)">Asset Map & Financials</div>
<div class="view-tab" onclick="switchView('ops',this)">AI Operations Intelligence</div>
</div>
</div>
<div class="view-container">
<div id="v-map" class="view-frame active">
<iframe src="map.html"></iframe>
</div>
<div id="v-ops" class="view-frame">
<iframe src="ops.html"></iframe>
</div>
</div>
<script>
function switchView(id,el){
document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.view-frame').forEach(f=>f.classList.remove('active'));
el.classList.add('active');
document.getElementById('v-'+id).classList.add('active');
}
</script>
</body>
</html>
