<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delek US — Pipeline & Refinery Operations Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--card:#161b22;--card2:#1c2128;--bdr:#30363d;--t1:#e6edf3;--t2:#8b949e;--t3:#6e7681;--crude:#f0883e;--refined:#58a6ff;--gather:#3fb950;--jv:#d2a8ff;--water:#79c0ff;--ref:#ff7b72;--term:#ffd700;--bio:#56d364;--grn:#3fb950;--red:#ff7b72;--r:8px;--rl:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;display:grid;grid-template-columns:400px 1fr;grid-template-rows:56px 1fr}
header{grid-column:1/-1;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:1000}
header .brand{display:flex;align-items:center;gap:10px}
header .brand .logo{width:26px;height:26px;background:var(--crude);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--bg)}
header .brand h1{font-size:14px;font-weight:700;letter-spacing:-.02em}
header .brand h1 span{color:var(--t2);font-weight:400}
header .ctrls{display:flex;gap:6px}
.tbtn{padding:4px 10px;font-size:10px;font-family:'JetBrains Mono',monospace;background:var(--bg);border:1px solid var(--bdr);border-radius:5px;color:var(--t2);cursor:pointer;transition:.15s;font-weight:600}
.tbtn:hover{border-color:var(--crude);color:var(--t1)}
.tbtn.on{background:rgba(240,136,62,.12);border-color:var(--crude);color:var(--crude)}
header .meta{display:flex;gap:14px;font-size:10px;color:var(--t2);font-family:'JetBrains Mono',monospace}
header .meta .tag{padding:2px 7px;background:rgba(240,136,62,.12);border:1px solid rgba(240,136,62,.25);border-radius:4px;color:var(--crude)}
aside{background:var(--card);border-right:1px solid var(--bdr);overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
aside::-webkit-scrollbar{width:5px}aside::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
.stabs{display:flex;gap:2px;background:var(--bg);border-radius:7px;padding:3px;border:1px solid var(--bdr)}
.stab{flex:1;padding:6px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;text-align:center;cursor:pointer;border-radius:5px;color:var(--t3);transition:.15s}
.stab:hover{color:var(--t2)}.stab.on{background:var(--card);color:var(--crude);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tc{display:none}.tc.on{display:flex;flex-direction:column;gap:8px}
.ss{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden}
.sh{padding:9px 11px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;transition:.15s}
.sh:hover{background:var(--card2)}
.sh .d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sh .a{margin-left:auto;font-size:8px;transition:transform .2s}
.ss.c .a{transform:rotate(-90deg)}.ss.c .sb{display:none}
.sb{padding:0 11px 11px}
.ac{padding:7px 0;border-bottom:1px solid var(--bdr);cursor:pointer;transition:.15s}
.ac:last-child{border-bottom:none}.ac:hover .an{color:var(--crude)}
.an{font-size:11px;font-weight:600;margin-bottom:2px;transition:color .15s}
.ad{font-size:9px;color:var(--t2);line-height:1.4;font-family:'JetBrains Mono',monospace}
.ad .l{color:var(--t3)}
.ab{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.b{font-size:8px;padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-weight:600}
.b-c{background:rgba(240,136,62,.12);color:var(--crude);border:1px solid rgba(240,136,62,.2)}
.b-r{background:rgba(88,166,255,.12);color:var(--refined);border:1px solid rgba(88,166,255,.2)}
.b-g{background:rgba(63,185,80,.12);color:var(--gather);border:1px solid rgba(63,185,80,.2)}
.b-j{background:rgba(210,168,255,.12);color:var(--jv);border:1px solid rgba(210,168,255,.2)}
.b-a{background:rgba(139,148,158,.12);color:var(--t2);border:1px solid rgba(139,148,158,.2)}
.sr{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;font-size:10px;border-bottom:1px solid rgba(48,54,61,.4)}
.sr:last-child{border-bottom:none}.sl{color:var(--t2)}.sv{font-weight:600;font-family:'JetBrains Mono',monospace;font-size:10px}
.bi{display:flex;align-items:center;gap:5px}.bl{font-size:9px;color:var(--t2);width:80px;text-align:right;flex-shrink:0}
.bt{flex:1;height:14px;background:rgba(48,54,61,.5);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:4px;font-size:8px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--bg);transition:width .8s}
.lg{display:flex;flex-wrap:wrap;gap:7px;margin-top:5px}
.li{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--t2)}
.ls{width:12px;height:2px;border-radius:1px}
.fc{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);padding:9px;margin-bottom:6px}
.ft{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:6px}
.fr{display:flex;justify-content:space-between;padding:3px 0;font-size:10px;border-bottom:1px solid rgba(48,54,61,.3)}
.fr:last-child{border-bottom:none}.fl{color:var(--t2)}.fv{font-weight:600;font-family:'JetBrains Mono',monospace}.fv.g{color:var(--grn)}.fv.r{color:var(--red)}
.fb{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
.fs{font-size:9px;color:var(--t2);margin-top:2px}
.spr{display:flex;align-items:center;gap:8px;margin-top:4px}
.spl{font-size:9px;color:var(--t3);width:28px;flex-shrink:0}
.spt{flex:1;height:5px;background:rgba(48,54,61,.5);border-radius:3px;overflow:hidden}
.spf{height:100%;border-radius:3px;transition:width .6s}
.spv{font-size:9px;font-family:'JetBrains Mono',monospace;width:48px;text-align:right;flex-shrink:0}
#map{width:100%;height:100%;background:var(--bg)}
.leaflet-popup-content-wrapper{background:var(--card)!important;color:var(--t1)!important;border:1px solid var(--bdr)!important;border-radius:var(--rl)!important;box-shadow:0 12px 40px rgba(0,0,0,.5)!important;padding:0!important;font-family:'DM Sans',sans-serif!important}
.leaflet-popup-tip{background:var(--card)!important;border:1px solid var(--bdr)!important}
.leaflet-popup-content{margin:0!important;width:280px!important}
.pp{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.pp .pt{font-size:8px;padding:2px 5px;border-radius:3px;background:rgba(88,166,255,.1);color:var(--refined);border:1px solid rgba(88,166,255,.2)}
@keyframes dash{to{stroke-dashoffset:-30}}
.leaflet-control-attribution{font-size:8px!important;background:rgba(13,17,23,.85)!important;color:var(--t3)!important}
.leaflet-control-attribution a{color:var(--refined)!important}
.leaflet-control-zoom a{background:var(--card)!important;color:var(--t1)!important;border-color:var(--bdr)!important}
.leaflet-control-zoom a:hover{background:var(--card2)!important}
#dp{position:fixed;top:56px;right:0;width:420px;height:calc(100vh - 56px);background:var(--card);border-left:1px solid var(--bdr);z-index:900;overflow-y:auto;padding:20px;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 30px rgba(0,0,0,.3)}
#dp.open{transform:translateX(0)}
#dp::-webkit-scrollbar{width:5px}#dp::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
.pc{position:absolute;top:14px;right:14px;width:26px;height:26px;background:var(--bg);border:1px solid var(--bdr);border-radius:5px;color:var(--t2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.pc:hover{background:var(--card2);color:var(--t1)}
.pt2{font-size:17px;font-weight:700;margin-bottom:3px;padding-right:36px}
.ps{font-size:10px;color:var(--t2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em}
.px{margin-bottom:14px}
.pxt{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:7px}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pm{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);padding:9px}
.pmv{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace}
.pml{font-size:8px;color:var(--t2);margin-top:1px;text-transform:uppercase;letter-spacing:.05em}
.pli{padding:5px 0;border-bottom:1px solid rgba(48,54,61,.4);font-size:10px;display:flex;justify-content:space-between}
.pli:last-child{border-bottom:none}
@media(max-width:900px){body{grid-template-columns:1fr}aside{display:none}#dp{width:100%}}
</style>
</head>
<body>
<header>

<script>
const R=[{id:'tyler',n:'Tyler Refinery',ll:[32.3513,-95.3011],cap:75000,yb:1940,acq:2005,src:'East Texas, Permian via Red River',p:['Gasoline','Diesel','Jet Fuel','LPG'],mkt:'NE Texas (PADD 3 TX Inland)',nc:10.1,st:2100000,mg:14.80,ut:92,ox:5.40,nt:'Original Delek asset. Coker 10k bpd, FCCU 20k bpd. Tank acq from DKL Jan 2026 ($19M).'},{id:'big_spring',n:'Big Spring Refinery',ll:[32.2502,-101.4787],cap:73000,yb:1929,acq:2017,src:'Permian Basin (direct gathering)',p:['Gasoline','Diesel','Asphalt','Jet Fuel','LPG'],mkt:'West TX, SW US (PADD 3 TX Inland)',nc:11.8,st:3200000,mg:16.20,ut:85,ox:5.80,nt:'50 mi from Permian. 75 tanks. DOE carbon capture 145k mt CO₂/yr. Q1 2026 turnaround: 22-28k bpd. Expansion to 100k bpd planned.'},{id:'el_dorado',n:'El Dorado Refinery',ll:[33.2076,-92.6663],cap:80000,yb:1922,acq:2011,src:'Local AR, Cushing via Red River',p:['Gasoline','Diesel','Asphalt','LPG'],mkt:'Midwest, MS River (PADD 2/3)',nc:9.6,st:2600000,mg:12.50,ut:88,ox:4.90,nt:'~1,000 mi local gathering. EOP: margin $3.41→$6.20/bbl (+$50M). Terminals Memphis & Nashville.'},{id:'krotz_springs',n:'Krotz Springs Refinery',ll:[30.5390,-91.7540],cap:74000,yb:1980,acq:2017,src:'Gulf Coast, Local LA',p:['Gasoline','Jet Fuel','Hi-S Diesel','LPG','Isobutane','Polygas','Reformate','Naphtha','LCO'],mkt:'Louisiana, Gulf (PADD 3 LA Gulf)',nc:8.9,st:1800000,mg:11.30,ut:90,ox:5.10,nt:'Youngest US refinery. $150M investment. Alky unit 2019. Port of Krotz Springs dock. Broadest product slate.'}];
const T=[{n:'Memphis Terminal',ll:[35.1495,-90.0490],tp:'Product Dist.',pr:'Gasoline, Diesel',by:'El Dorado',mk:'PADD 2'},{n:'Nashville Terminal',ll:[36.1627,-86.7816],tp:'Product Dist.',pr:'Gasoline, Diesel',by:'El Dorado',mk:'PADD 2'},{n:'Mt. Pleasant Terminal',ll:[33.1568,-94.9680],tp:'Product Dist.',pr:'Gasoline, Diesel',by:'Tyler',mk:'PADD 3'},{n:'Big Spring Truck Unloading',ll:[32.2520,-101.4650],tp:'Crude Receiving',pr:'Crude',by:'Big Spring',mk:'PADD 3',ca:'10k bpd'}];
const BD=[{n:'Cleburne Biodiesel',ll:[32.3474,-97.3867],ca:'~13 MMgal/yr'},{n:'Crossett Biodiesel',ll:[33.1282,-91.9613],ca:'~13 MMgal/yr'},{n:'New Albany Biodiesel',ll:[34.4940,-89.0078],ca:'~14 MMgal/yr'}];
const P=[
{id:'etc',n:'East TX Crude Logistics',t:'crude',c:'#f0883e',pt:[[32.77,-94.40],[32.60,-94.80],[32.45,-95.10],[32.35,-95.30]],di:'10"-16"',mi:65,cap:75000,th:35000,pr:'Crude Oil',nt:'Nettleton & McMurrey → Tyler. 10-yr MVC 35k bpd fee basis.'},
{id:'rr',n:'Red River Pipeline (JV 33%)',t:'jv',c:'#d2a8ff',pt:[[35.95,-96.75],[35.50,-96.20],[35.00,-95.60],[34.50,-95.20],[34.00,-94.80],[33.50,-94.90],[33.10,-95.00],[32.70,-95.10],[32.50,-94.75]],di:'16"',mi:370,cap:235000,th:100000,pr:'Crude Oil',nt:'Cushing→Longview. 33% DKL / 67% Plains. Expanded 150k→235k bpd. T&D 100k bpd.'},
{id:'mg',n:'Midland Gathering System',t:'gathering',c:'#3fb950',pt:[[32.55,-101.80],[32.45,-101.70],[32.35,-101.55],[32.30,-101.50],[32.25,-101.48]],di:'4"-10"',mi:200,cap:350000,th:120000,pr:'Crude Oil',nt:'Howard/Borden/Martin Cos. MVC 120k bpd + 50k 3rd party. Record Q4 2025 volumes.'},
{id:'bsp',n:'Big Spring–Midland Pipeline',t:'crude',c:'#f0883e',pt:[[32.25,-101.48],[32.15,-101.60],[32.05,-101.80],[32.00,-102.08]],di:'8"',mi:40,cap:50000,th:35000,pr:'Crude Oil',nt:'Acquired Plains Sept 2017.'},
{id:'edg',n:'El Dorado/AR Gathering',t:'gathering',c:'#3fb950',pt:[[33.80,-92.90],[33.60,-92.80],[33.40,-92.70],[33.21,-92.66]],di:'2"-8"',mi:600,cap:80000,th:40000,pr:'Crude Oil',nt:'~1,000 mi incl. laterals across S. Arkansas.'},
{id:'tp',n:'Tyler Product Pipeline',t:'refined',c:'#58a6ff',pt:[[32.35,-95.30],[32.50,-95.10],[32.70,-94.90],[33.00,-94.80],[33.16,-94.97]],di:'6"-10"',mi:80,cap:60000,th:45000,pr:'Gasoline, Diesel',nt:'Tyler → Mt. Pleasant & NE Texas distribution.'},
{id:'edp',n:'El Dorado Product Pipeline',t:'refined',c:'#58a6ff',pt:[[33.21,-92.66],[33.50,-92.20],[34.00,-91.50],[34.50,-90.80],[35.15,-90.05]],di:'6"-12"',mi:200,cap:60000,th:35000,pr:'Gasoline, Diesel, Asphalt',nt:'El Dorado → Memphis. MS River corridor.'},
{id:'w2w',n:'Wink to Webster (JV 15%)',t:'jv',c:'#d2a8ff',pt:[[31.75,-103.16],[31.80,-102.50],[31.99,-102.08],[32.10,-101.50],[32.00,-100.50],[31.60,-99.50],[31.00,-98.50],[30.50,-97.50],[30.00,-96.50],[29.70,-95.80],[29.55,-95.30],[29.54,-95.17]],di:'36"',mi:650,cap:1500000,th:null,pr:'Crude Oil',nt:'Permian→Houston. ExxonMobil (op), Plains, MPLX, Delek 15%, Lotus, Rattler. Integrated w/ BS gathering.'},
{id:'dg',n:'Delaware Basin G&P',t:'gathering',c:'#3fb950',pt:[[32.50,-104.20],[32.35,-104.00],[32.20,-103.80],[32.10,-103.50],[32.05,-103.30]],di:'4"-12"',mi:300,cap:null,th:null,pr:'Crude, NatGas, Water',nt:'Lea Co NM. Libby 1 & 2 plants. AGI/sour gas. 3Bear Energy 2022.'}
];
const W=[{n:'H2O Midstream',ll:[32.10,-101.90],nt:'Water gathering & recycling, Midland Basin.'},{n:'Gravity Water',ll:[32.25,-102.30],nt:'Water disposal & recycling, Permian Basin.'}];
const DR=[
{pt:[[33.21,-92.66],[34.20,-90.50],[35.15,-90.05],[35.50,-88.50],[36.16,-86.78]],n:'El Dorado → Nashville',pr:'Gasoline, Diesel'},
{pt:[[32.35,-95.30],[32.00,-94.50],[31.80,-94.10],[31.50,-93.80]],n:'Tyler → E. Texas Markets',pr:'Gasoline, Diesel, Jet'},
{pt:[[32.25,-101.48],[32.00,-101.00],[31.70,-100.50],[31.50,-100.00]],n:'Big Spring → W. TX',pr:'Gasoline, Diesel, Asphalt'},
{pt:[[30.54,-91.75],[30.30,-91.50],[30.10,-91.20],[29.95,-90.50],[29.97,-90.07]],n:'Krotz Springs → LA Gulf',pr:'Gasoline, Jet, Petrochemicals'}
];

const map=L.map('map',{center:[32.5,-97.5],zoom:6,zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OSM © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

function mi(cl,sz=10,sh='circle'){
if(sh==='diamond')return L.divIcon({className:'',html:`<svg width="${sz+5}" height="${sz+5}" viewBox="0 0 ${sz+5} ${sz+5}"><rect x="${(sz+5)/2}" y="2" width="${sz*.6}" height="${sz*.6}" transform="rotate(45 ${(sz+5)/2} ${(sz+5)/2})" fill="${cl}" stroke="#0d1117" stroke-width="1.5"/></svg>`,iconSize:[sz+5,sz+5],iconAnchor:[(sz+5)/2,(sz+5)/2]});
if(sh==='square')return L.divIcon({className:'',html:`<svg width="${sz+3}" height="${sz+3}" viewBox="0 0 ${sz+3} ${sz+3}"><rect x="1.5" y="1.5" width="${sz}" height="${sz}" rx="2" fill="${cl}" stroke="#0d1117" stroke-width="1.5"/></svg>`,iconSize:[sz+3,sz+3],iconAnchor:[(sz+3)/2,(sz+3)/2]});
return L.divIcon({className:'',html:`<svg width="${sz+3}" height="${sz+3}" viewBox="0 0 ${sz+3} ${sz+3}"><circle cx="${(sz+3)/2}" cy="${(sz+3)/2}" r="${sz/2}" fill="${cl}" stroke="#0d1117" stroke-width="1.5"/></svg>`,iconSize:[sz+3,sz+3],iconAnchor:[(sz+3)/2,(sz+3)/2]});
}
function ri(){return L.divIcon({className:'',html:'<svg width="28" height="28" viewBox="0 0 28 28"><rect x="2" y="2" width="24" height="24" rx="5" fill="#ff7b72" stroke="#0d1117" stroke-width="2"/><text x="14" y="18" text-anchor="middle" fill="#0d1117" font-size="11" font-weight="bold" font-family="sans-serif">R</text></svg>',iconSize:[28,28],iconAnchor:[14,14]})}

const lg={pipes:L.layerGroup().addTo(map),fac:L.layerGroup().addTo(map),padd:L.layerGroup(),dist:L.layerGroup()};
const pl={};

P.forEach(p=>{
const g=L.polyline(p.pt,{color:p.c,weight:7,opacity:.1,smoothFactor:1.5});
const l=L.polyline(p.pt,{color:p.c,weight:3,opacity:.85,smoothFactor:1.5,dashArray:p.t==='jv'?'8 6':null});
const f=L.polyline(p.pt,{color:'#fff',weight:1.5,opacity:.22,dashArray:'4 26',smoothFactor:1.5,className:'fl'});
lg.pipes.addLayer(g);lg.pipes.addLayer(l);lg.pipes.addLayer(f);
l.on('click',()=>opP(p));l.on('mouseover',()=>l.setStyle({weight:5,opacity:1}));l.on('mouseout',()=>l.setStyle({weight:3,opacity:.85}));
l.bindTooltip(`<b>${p.n}</b><br>${p.mi} mi · ${p.pr}`,{sticky:true,className:'ptt'});
pl[p.id]={g,l,f};
});
DR.forEach(d=>{lg.dist.addLayer(L.polyline(d.pt,{color:'rgba(88,166,255,.35)',weight:2,opacity:.5,dashArray:'4 8',smoothFactor:1.5}).bindTooltip(`<b>${d.n}</b><br>${d.pr}`,{sticky:true,className:'ptt'}))});

R.forEach(r=>{const m=L.marker(r.ll,{icon:ri()});lg.fac.addLayer(m);m.on('click',()=>opR(r));m.bindTooltip(`<b>${r.n}</b><br>${r.cap.toLocaleString()} bpd`,{direction:'top',offset:[0,-12]})});
T.forEach(t=>{const m=L.marker(t.ll,{icon:mi('#ffd700',8,'square')});lg.fac.addLayer(m);m.bindTooltip(`<b>${t.n}</b><br>${t.tp}`,{direction:'top',offset:[0,-5]});m.on('click',()=>opG(t.n,'Terminal',[['Type',t.tp],['Products',t.pr],['Served By',t.by],['Market',t.mk],['Capacity',t.ca||'']]))});
