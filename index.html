<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0d1117;
    --bg-card: #161b22;
    --bg-card-hover: #1c2128;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent-crude: #f0883e;
    --accent-refined: #58a6ff;
    --accent-gathering: #3fb950;
    --accent-jv: #d2a8ff;
    --accent-water: #79c0ff;
    --accent-refinery: #ff7b72;
    --accent-terminal: #ffd700;
    --accent-biodiesel: #56d364;
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-columns: 380px 1fr;
    grid-template-rows: 56px 1fr;
  }

  /* ─── TOP BAR ─── */
  header {
    grid-column: 1 / -1;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 1000;
  }
  header .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .brand .logo {
    width: 28px; height: 28px;
    background: var(--accent-crude);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: var(--bg-dark);
  }
  header .brand h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  header .brand h1 span { color: var(--text-secondary); font-weight: 400; }
  header .meta {
    display: flex; gap: 24px; font-size: 12px; color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
  }
  header .meta .tag {
    padding: 3px 8px;
    background: rgba(240,136,62,0.12);
    border: 1px solid rgba(240,136,62,0.25);
    border-radius: 4px;
    color: var(--accent-crude);
  }

  /* ─── SIDEBAR ─── */
  aside {
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  aside::-webkit-scrollbar { width: 6px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .sidebar-section {
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .sidebar-section-header {
    padding: 12px 14px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .sidebar-section-header:hover { background: var(--bg-card-hover); }
  .sidebar-section-header .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .sidebar-section-header .arrow {
    margin-left: auto;
    font-size: 10px;
    transition: transform 0.2s;
  }
  .sidebar-section.collapsed .arrow { transform: rotate(-90deg); }
  .sidebar-section.collapsed .sidebar-section-body { display: none; }
  .sidebar-section-body { padding: 0 14px 14px; }

  /* Asset cards */
  .asset-card {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
  }
  .asset-card:last-child { border-bottom: none; }
  .asset-card:hover .asset-name { color: var(--accent-crude); }
  .asset-name {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
    transition: color 0.15s;
  }
  .asset-detail {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.5;
    font-family: 'JetBrains Mono', monospace;
  }
  .asset-detail .label { color: var(--text-muted); }
  .asset-badges { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }
  .badge-crude { background: rgba(240,136,62,0.12); color: var(--accent-crude); border: 1px solid rgba(240,136,62,0.2); }
  .badge-refined { background: rgba(88,166,255,0.12); color: var(--accent-refined); border: 1px solid rgba(88,166,255,0.2); }
  .badge-gas { background: rgba(63,185,80,0.12); color: var(--accent-gathering); border: 1px solid rgba(63,185,80,0.2); }
  .badge-water { background: rgba(121,192,255,0.12); color: var(--accent-water); border: 1px solid rgba(121,192,255,0.2); }
  .badge-jv { background: rgba(210,168,255,0.12); color: var(--accent-jv); border: 1px solid rgba(210,168,255,0.2); }
  .badge-asphalt { background: rgba(139,148,158,0.12); color: var(--text-secondary); border: 1px solid rgba(139,148,158,0.2); }

  /* Stat rows */
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    font-size: 12px;
    border-bottom: 1px solid rgba(48,54,61,0.5);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--text-secondary); }
  .stat-value { font-weight: 600; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

  /* Bar chart */
  .bar-chart { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .bar-item { display: flex; align-items: center; gap: 8px; }
  .bar-label { font-size: 11px; color: var(--text-secondary); width: 90px; text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 18px; background: rgba(48,54,61,0.5); border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 6px; font-size: 10px; font-weight: 600; font-family: 'JetBrains Mono', monospace; color: var(--bg-dark); transition: width 0.8s ease; }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); }
  .legend-swatch { width: 16px; height: 3px; border-radius: 2px; }

  /* ─── MAP ─── */
  #map {
    width: 100%; height: 100%;
    background: var(--bg-dark);
  }

  /* Custom popup */
  .leaflet-popup-content-wrapper {
    background: var(--bg-card) !important;
    color: var(--text-primary) !important;
    border: 1px solid var(--border) !important;
    border-radius: var(--radius-lg) !important;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5) !important;
    padding: 0 !important;
    font-family: 'DM Sans', sans-serif !important;

  .leaflet-popup-tip { background: var(--bg-card) !important; border: 1px solid var(--border) !important; }
  .leaflet-popup-content { margin: 0 !important; width: 300px !important; }
  .popup-inner { padding: 16px; }
  .popup-inner h3 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .popup-inner .popup-type { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .popup-inner .popup-stat { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
  .popup-inner .popup-stat:last-child { border-bottom: none; }
  .popup-inner .popup-stat .ps-label { color: var(--text-secondary); }
  .popup-inner .popup-stat .ps-value { font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .popup-products { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .popup-products .pp-tag {
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    background: rgba(88,166,255,0.1); color: var(--accent-refined);
    border: 1px solid rgba(88,166,255,0.2);
  }

  /* Flow animation keyframe for pipeline decorators */
  @keyframes dash { to { stroke-dashoffset: -30; } }

  /* Leaflet attribution */
  .leaflet-control-attribution { font-size: 9px !important; background: rgba(13,17,23,0.85) !important; color: var(--text-muted) !important; }
  .leaflet-control-attribution a { color: var(--accent-refined) !important; }
  .leaflet-control-zoom a { background: var(--bg-card) !important; color: var(--text-primary) !important; border-color: var(--border) !important; }
  .leaflet-control-zoom a:hover { background: var(--bg-card-hover) !important; }

  /* Detail panel overlay */
  #detail-panel {
    position: fixed;
    top: 56px; right: 0;
    width: 420px; height: calc(100vh - 56px);
    background: var(--bg-card);
    border-left: 1px solid var(--border);
    z-index: 900;
    overflow-y: auto;
    padding: 24px;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: -8px 0 30px rgba(0,0,0,0.3);
  }
  #detail-panel.open { transform: translateX(0); }
  #detail-panel::-webkit-scrollbar { width: 6px; }
  #detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .panel-close {
    position: absolute; top: 16px; right: 16px;
    width: 28px; height: 28px;
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-secondary);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .panel-close:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .panel-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; padding-right: 40px; }
  .panel-subtitle { font-size: 12px; color: var(--text-secondary); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.06em; }
  .panel-section { margin-bottom: 20px; }
  .panel-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px; }
  .panel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .panel-metric {
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
  }
  .panel-metric .pm-value { font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .panel-metric .pm-label { font-size: 10px; color: var(--text-secondary); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
  .panel-metric.full { grid-column: 1 / -1; }

  .panel-list-item {
    padding: 8px 0;
    border-bottom: 1px solid rgba(48,54,61,0.5);
    font-size: 12px;
    display: flex;
    justify-content: space-between;
  }
  .panel-list-item:last-child { border-bottom: none; }

  /* Responsive */
  @media (max-width: 900px) {
    body { grid-template-columns: 1fr; }
    aside { display: none; }
    #detail-panel { width: 100%; }
  }
</style>

  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Custom icon factory
function makeIcon(color, size = 14, shape = 'circle') {
  if (shape === 'diamond') {
    return L.divIcon({
      className: '',
      html: `<svg width="${size+8}" height="${size+8}" viewBox="0 0 ${size+8} ${size+8}"><rect x="${(size+8)/2}" y="2" width="${size*0.7}" height="${size*0.7}" transform="rotate(45 ${(size+8)/2} ${(size+8)/2})" fill="${color}" stroke="#0d1117" stroke-width="2"/></svg>`,
      iconSize: [size+8, size+8],
      iconAnchor: [(size+8)/2, (size+8)/2]
    });
  }
  if (shape === 'square') {
    return L.divIcon({
      className: '',
      html: `<svg width="${size+4}" height="${size+4}" viewBox="0 0 ${size+4} ${size+4}"><rect x="2" y="2" width="${size}" height="${size}" rx="3" fill="${color}" stroke="#0d1117" stroke-width="2"/></svg>`,
      iconSize: [size+4, size+4],
      iconAnchor: [(size+4)/2, (size+4)/2]
    });
  }
  return L.divIcon({
    className: '',
    html: `<svg width="${size+4}" height="${size+4}" viewBox="0 0 ${size+4} ${size+4}"><circle cx="${(size+4)/2}" cy="${(size+4)/2}" r="${size/2}" fill="${color}" stroke="#0d1117" stroke-width="2"/></svg>`,
    iconSize: [size+4, size+4],
    iconAnchor: [(size+4)/2, (size+4)/2]
  });
}

function refineryIcon() {
  return L.divIcon({
    className: '',
    html: `<svg width="32" height="32" viewBox="0 0 32 32">
      <rect x="2" y="2" width="28" height="28" rx="6" fill="#ff7b72" stroke="#0d1117" stroke-width="2"/>
      <text x="16" y="20" text-anchor="middle" fill="#0d1117" font-size="13" font-weight="bold" font-family="sans-serif">R</text>
    </svg>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16]
  });
}

// ═══════════════════════════════════════════════════
// DRAW PIPELINES
// ═══════════════════════════════════════════════════
const pipelineLayers = {};
PIPELINES.forEach(p => {
  // Background glow
  const glow = L.polyline(p.path, {
    color: p.color,
    weight: 8,
    opacity: 0.15,
    smoothFactor: 1.5
  }).addTo(map);

  // Main line
  const line = L.polyline(p.path, {
    color: p.color,
    weight: 3,
    opacity: 0.85,
    smoothFactor: 1.5,
    dashArray: p.type === 'jv' ? '8 6' : null
  }).addTo(map);

  // Flow animation overlay
  const flow = L.polyline(p.path, {
    color: '#ffffff',
    weight: 1.5,
    opacity: 0.3,
    dashArray: '4 26',
    smoothFactor: 1.5,
    className: 'flow-line'
  }).addTo(map);

  line.on('click', () => openPipelinePanel(p));
  line.on('mouseover', () => { line.setStyle({ weight: 5, opacity: 1 }); });
  line.on('mouseout', () => { line.setStyle({ weight: 3, opacity: 0.85 }); });

  // Tooltip
  line.bindTooltip(`<b>${p.name}</b><br>${p.length_mi} mi · ${p.products}`, {
    sticky: true,
    className: 'pipeline-tooltip'
  });

  pipelineLayers[p.id] = { glow, line, flow };
});

// ═══════════════════════════════════════════════════
// DRAW REFINERIES
// ═══════════════════════════════════════════════════
REFINERIES.forEach(r => {
  const marker = L.marker(r.location, { icon: refineryIcon() }).addTo(map);
  marker.on('click', () => openRefineryPanel(r));
  marker.bindTooltip(`<b>${r.name}</b><br>${r.capacity_bpd.toLocaleString()} bpd`, { direction: 'top', offset: [0, -16] });
});

// ═══════════════════════════════════════════════════
// DRAW TERMINALS
// ═══════════════════════════════════════════════════
TERMINALS.forEach(t => {
  const marker = L.marker(t.location, { icon: makeIcon('#ffd700', 10, 'square') }).addTo(map);
  marker.bindTooltip(`<b>${t.name}</b><br>${t.type}`, { direction: 'top', offset: [0, -8] });
  marker.on('click', () => {
    openGenericPanel(t.name, 'Terminal / Facility', [
      ['Type', t.type],
      ['Products', t.products.join(', ')],
      ['Served By', t.served_by],
      ...(t.capacity ? [['Capacity', t.capacity]] : [])
    ]);
  });
});

// ═══════════════════════════════════════════════════
// DRAW BIODIESEL
// ═══════════════════════════════════════════════════
BIODIESEL.forEach(b => {
  const marker = L.marker(b.location, { icon: makeIcon('#56d364', 10, 'diamond') }).addTo(map);
  marker.bindTooltip(`<b>${b.name}</b><br>${b.capacity}`, { direction: 'top', offset: [0, -8] });

// ═══════════════════════════════════════════════════
// DRAW WATER SYSTEMS
// ═══════════════════════════════════════════════════
WATER_SYSTEMS.forEach(w => {

});

// Key locations labels
const keyLocations = [
  { name: 'Cushing, OK', location: [35.985, -96.77] },

// ═══════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════
function toggleSection(header) {
  header.parentElement.classList.toggle('collapsed');
}

function flyToRefinery(id) {
  const r = REFINERIES.find(x => x.id === id);
  if (r) {
    map.flyTo(r.location, 10, { duration: 1 });
    openRefineryPanel(r);
  }
}

function flyToPipeline(id) {
  const p = PIPELINES.find(x => x.id === id);
  if (p && pipelineLayers[id]) {
    map.flyToBounds(pipelineLayers[id].line.getBounds().pad(0.3), { duration: 1 });
    openPipelinePanel(p);
  }
}

function openRefineryPanel(r) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('panel-content');
  const utilization = Math.round((r.capacity_bpd * 0.88) / r.capacity_bpd * 100);

  content.innerHTML = `
    <div class="panel-title">${r.name}</div>
    <div class="panel-subtitle" style="color:var(--accent-refinery)">Refinery · Delek US Holdings (NYSE: DK)</div>

    <div class="panel-section">
      <div class="panel-section-title">Capacity & Operations</div>
      <div class="panel-grid">
        <div class="panel-metric">
          <div class="pm-value" style="color:var(--accent-refinery)">${r.capacity_bpd.toLocaleString()}</div>
          <div class="pm-label">Nameplate BPD</div>
        </div>
        <div class="panel-metric">
          <div class="pm-value">${utilization}%</div>
          <div class="pm-label">Est. Utilization</div>
        </div>
        <div class="panel-metric">
          <div class="pm-value">${r.nelson_complexity}</div>
          <div class="pm-label">Nelson Complexity</div>
        </div>
        <div class="panel-metric">
          <div class="pm-value">${(r.storage_bbl / 1000000).toFixed(1)}M</div>
          <div class="pm-label">Storage (bbl)</div>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Details</div>
      <div class="panel-list-item"><span style="color:var(--text-secondary)">Year Built</span><span>${r.year_built}</span></div>
      <div class="panel-list-item"><span style="color:var(--text-secondary)">Acquired</span><span>${r.acquired}</span></div>
      <div class="panel-list-item"><span style="color:var(--text-secondary)">Crude Source</span><span style="text-align:right;max-width:220px">${r.crude_source}</span></div>
      <div class="panel-list-item"><span style="color:var(--text-secondary)">Primary Markets</span><span style="text-align:right;max-width:220px">${r.markets}</span></div>
      <div class="panel-list-item"><span style="color:var(--text-secondary)">Location</span><span>${r.location[0].toFixed(4)}, ${r.location[1].toFixed(4)}</span></div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Products</div>
      <div class="popup-products">
        ${r.products.map(p => `<span class="pp-tag">${p}</span>`).join('')}
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Notes</div>
      <p style="font-size:12px;line-height:1.6;color:var(--text-secondary)">${r.notes}</p>
    </div>
  `;
  panel.classList.add('open');
}

function openPipelinePanel(p) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('panel-content');
  const typeLabel = { crude: 'Crude Oil Pipeline', refined: 'Refined Product Pipeline', gathering: 'Gathering System', jv: 'Joint Venture Pipeline' };
  const typeColor = { crude: 'var(--accent-crude)', refined: 'var(--accent-refined)', gathering: 'var(--accent-gathering)', jv: 'var(--accent-jv)' };

  content.innerHTML = `
    <div class="panel-title">${p.name}</div>
    <div class="panel-subtitle" style="color:${typeColor[p.type]}">${typeLabel[p.type]} · Delek Logistics (NYSE: DKL)</div>

    <div class="panel-section">
      <div class="panel-section-title">Specifications</div>
      <div class="panel-grid">
        <div class="panel-metric">
          <div class="pm-value">${p.length_mi}</div>
          <div class="pm-label">Length (miles)</div>
        </div>
        <div class="panel-metric">
          <div class="pm-value">${p.diameter}</div>
          <div class="pm-label">Diameter</div>
        </div>
        ${p.capacity_bpd ? `
        <div class="panel-metric">
          <div class="pm-value" style="color:${typeColor[p.type]}">${p.capacity_bpd.toLocaleString()}</div>
          <div class="pm-label">Capacity (BPD)</div>
        </div>` : ''}
        ${p.throughput_bpd ? `
        <div class="panel-metric">
          <div class="pm-value">${p.throughput_bpd.toLocaleString()}</div>
          <div class="pm-label">MVC / Throughput (BPD)</div>
        </div>` : ''}
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Products Transported</div>
      <div class="popup-products">
        ${p.products.split(', ').map(pr => `<span class="pp-tag">${pr}</span>`).join('')}
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Route Details</div>
      <div class="panel-list-item"><span style="color:var(--text-secondary)">Origin</span><span>${p.path[0][0].toFixed(2)}°N, ${Math.abs(p.path[0][1]).toFixed(2)}°W</span></div>
      <div class="panel-list-item"><span style="color:var(--text-secondary)">Terminus</span><span>${p.path[p.path.length-1][0].toFixed(2)}°N, ${Math.abs(p.path[p.path.length-1][1]).toFixed(2)}°W</span></div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Notes</div>
      <p style="font-size:12px;line-height:1.6;color:var(--text-secondary)">${p.notes}</p>
    </div>
  `;
  panel.classList.add('open');
}

function openGenericPanel(name, subtitle, rows) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('panel-content');
  content.innerHTML = `
    <div class="panel-title">${name}</div>
    <div class="panel-subtitle">${subtitle}</div>
    <div class="panel-section">
      ${rows.map(([l, v]) => `<div class="panel-list-item"><span style="color:var(--text-secondary)">${l}</span><span>${v}</span></div>`).join('')}
    </div>
  `;
  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
}

// Close panel on map click
map.on('click', closePanel);

// Build sidebar
buildSidebar();

// Animate flow lines
(function animateFlows() {
  document.querySelectorAll('.flow-line').forEach(el => {
    // CSS animation handles this via the class
  });
})();
</script>
