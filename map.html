<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DKL — Delek Logistics Full Operations & Competitive Intelligence Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0e13;--c1:#141820;--c2:#1a1f2a;--bd:#262d3a;--t1:#e2e8f0;--t2:#8b95a5;--t3:#5a6475;--o:#e8863a;--b:#4d96e8;--g:#3dba54;--p:#a87de8;--cy:#5cc4d4;--r:#e85454;--gd:#d4a843;--tl:#2db88a;--pk:#e86498;--rd:6px;--rl:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;display:grid;grid-template-columns:420px 1fr;grid-template-rows:48px 1fr}
header{grid-column:1/-1;background:var(--c1);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:1000}
.brand{display:flex;align-items:center;gap:8px}
.logo{width:30px;height:30px;background:linear-gradient(135deg,var(--o),#c66a20);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff;font-family:'JetBrains Mono',monospace}
header h1{font-size:13px;font-weight:700}
header h1 span{color:var(--t2);font-weight:400;font-size:11px}
.hc{display:flex;gap:4px}.hb{padding:3px 8px;font-size:8px;font-family:'JetBrains Mono',monospace;background:var(--bg);border:1px solid var(--bd);border-radius:4px;color:var(--t3);cursor:pointer;font-weight:600;transition:.12s}
.hb:hover{border-color:var(--o);color:var(--t1)}.hb.on{background:rgba(232,134,58,.1);border-color:var(--o);color:var(--o)}
.hm{display:flex;gap:10px;font-size:9px;color:var(--t2);font-family:'JetBrains Mono',monospace;align-items:center}
.ht{padding:2px 6px;background:rgba(232,134,58,.08);border:1px solid rgba(232,134,58,.18);border-radius:3px;color:var(--o);font-weight:600}
aside{background:var(--c1);border-right:1px solid var(--bd);overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
aside::-webkit-scrollbar{width:4px}aside::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.tabs{display:flex;gap:0;background:var(--bg);border-radius:6px;padding:2px;border:1px solid var(--bd)}
.tab{flex:1;padding:5px 2px;font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;text-align:center;cursor:pointer;border-radius:4px;color:var(--t3);transition:.12s;white-space:nowrap}
.tab:hover{color:var(--t2)}.tab.on{background:var(--c1);color:var(--o);box-shadow:0 1px 2px rgba(0,0,0,.3)}
.tp{display:none}.tp.on{display:flex;flex-direction:column;gap:6px}
.sec{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.sh{padding:7px 9px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);display:flex;align-items:center;gap:5px;cursor:pointer;transition:.1s}
.sh:hover{background:var(--c2)}.sh .d{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sh .ar{margin-left:auto;font-size:7px;transition:transform .2s}
.sec.cl .ar{transform:rotate(-90deg)}.sec.cl .sb{display:none}
.sb{padding:0 9px 9px}
.ac{padding:5px 0;border-bottom:1px solid var(--bd);cursor:pointer;transition:.1s}
.ac:last-child{border-bottom:none}.ac:hover .an{color:var(--o)}
.an{font-size:10px;font-weight:600;margin-bottom:1px;transition:color .1s}
.ad{font-size:8px;color:var(--t2);line-height:1.3;font-family:'JetBrains Mono',monospace}
.ad .l{color:var(--t3)}
.sr{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;font-size:9px;border-bottom:1px solid rgba(38,45,58,.4)}
.sr:last-child{border-bottom:none}.sl{color:var(--t2)}.sv{font-weight:600;font-family:'JetBrains Mono',monospace;font-size:9px}
.fc{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rd);padding:7px;margin-bottom:5px}
.ft{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:4px}
.fr{display:flex;justify-content:space-between;padding:2px 0;font-size:9px;border-bottom:1px solid rgba(38,45,58,.25)}
.fr:last-child{border-bottom:none}.fl{color:var(--t2)}.fv{font-weight:600;font-family:'JetBrains Mono',monospace;font-size:9px}
.fv.g{color:var(--g)}.fv.r{color:var(--r)}.fv.o{color:var(--o)}.fv.b{color:var(--b)}.fv.p{color:var(--p)}
.fb{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace}
.fs{font-size:7px;color:var(--t2);margin-top:1px}
.bi{display:flex;align-items:center;gap:4px;margin-top:2px}
.bl{font-size:8px;color:var(--t2);width:48px;text-align:right;flex-shrink:0}
.bt{flex:1;height:11px;background:rgba(38,45,58,.5);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:3px;font-size:6px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#fff;transition:width .5s}
.spr{display:flex;align-items:center;gap:5px;margin-top:2px}
.spl{font-size:7px;color:var(--t3);width:22px;flex-shrink:0}
.spt{flex:1;height:4px;background:rgba(38,45,58,.5);border-radius:2px;overflow:hidden}
.spf{height:100%;border-radius:2px}
.spv{font-size:7px;font-family:'JetBrains Mono',monospace;width:48px;text-align:right;flex-shrink:0}
#map{width:100%;height:100%;background:var(--bg)}
.leaflet-popup-content-wrapper{background:var(--c1)!important;color:var(--t1)!important;border:1px solid var(--bd)!important;border-radius:8px!important;box-shadow:0 8px 30px rgba(0,0,0,.5)!important;padding:0!important;font-family:'DM Sans',sans-serif!important}
.leaflet-popup-tip{background:var(--c1)!important;border:1px solid var(--bd)!important}
.leaflet-popup-content{margin:0!important;width:240px!important}
@keyframes dash{to{stroke-dashoffset:-30}}
.leaflet-control-attribution{font-size:7px!important;background:rgba(11,14,19,.85)!important;color:var(--t3)!important}
.leaflet-control-attribution a{color:var(--b)!important}
.leaflet-control-zoom a{background:var(--c1)!important;color:var(--t1)!important;border-color:var(--bd)!important}
#dp{position:fixed;top:48px;right:0;width:420px;height:calc(100vh - 48px);background:var(--c1);border-left:1px solid var(--bd);z-index:900;overflow-y:auto;padding:14px;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:-6px 0 20px rgba(0,0,0,.3)}
#dp.open{transform:translateX(0)}#dp::-webkit-scrollbar{width:4px}#dp::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.dpx{position:absolute;top:10px;right:10px;width:22px;height:22px;background:var(--bg);border:1px solid var(--bd);border-radius:4px;color:var(--t2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.dpt{font-size:14px;font-weight:700;margin-bottom:2px;padding-right:28px}
.dps{font-size:8px;color:var(--t2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.dpn{margin-bottom:10px}
.dpnt{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:5px}
.dpg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.dpm{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rd);padding:7px}
.dpmv{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace}
.dpml{font-size:6px;color:var(--t2);margin-top:1px;text-transform:uppercase;letter-spacing:.04em}
.dpli{padding:3px 0;border-bottom:1px solid rgba(38,45,58,.35);font-size:9px;display:flex;justify-content:space-between}
.dpli:last-child{border-bottom:none}
.pp{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.ppt{font-size:6px;padding:1px 4px;border-radius:2px;background:rgba(77,150,232,.08);color:var(--b);border:1px solid rgba(77,150,232,.12)}
table.ct{width:100%;border-collapse:collapse;font-size:7px;font-family:'JetBrains Mono',monospace}
table.ct th{text-align:right;padding:3px 2px;color:var(--t3);font-size:6px;border-bottom:1px solid var(--bd)}
table.ct th:first-child{text-align:left}
table.ct td{text-align:right;padding:2px;border-bottom:1px solid rgba(38,45,58,.25)}
table.ct td:first-child{text-align:left;color:var(--t2)}
.vd-row{display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid rgba(38,45,58,.2);font-size:8px}
.vd-row:last-child{border-bottom:none}
.vd-lbl{flex:1;color:var(--t2);font-size:7px}
.vd-cur{width:36px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:600}
.vd-bar{flex:1.5;height:6px;background:rgba(38,45,58,.5);border-radius:3px;overflow:hidden;position:relative}
.vd-fill{height:100%;border-radius:3px;position:absolute;left:0;top:0}
.vd-val{width:55px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:600;color:var(--g)}
@media(max-width:960px){body{grid-template-columns:1fr}aside{display:none}#dp{width:100%}}
</style>
</head>
<body>
<header>
<div class="brand"><div class="logo">DKL</div><h1>DKL Operations & Competitive Intelligence <span>— Vistratex Analysis Dashboard</span></h1></div>
<div class="hc">
<button class="hb on" onclick="tgl('dkl',this)">DKL Assets</button>
<button class="hb on" onclick="tgl('comp',this)">Competitors</button>
<button class="hb" onclick="tgl('padd',this)">PADD</button>
</div>
<div class="hm"><span class="ht">FY25 $535.6M EBITDA</span><span>Vistratex Target: $650-740M</span></div>
</header>
<aside>
<div class="tabs">
<div class="tab on" onclick="st('a',this)">Assets</div>
<div class="tab" onclick="st('f',this)">Financials</div>
<div class="tab" onclick="st('v',this)">Vistratex</div>
<div class="tab" onclick="st('b',this)">Benchmark</div>
<div class="tab" onclick="st('p',this)">Peers</div>
<div class="tab" onclick="st('r',this)">RAU</div>
</div>
<div id="ta" class="tp on"></div>
<div id="tf" class="tp"></div>
<div id="tv" class="tp"></div>
<div id="tb" class="tp"></div>
<div id="tp" class="tp"></div>
<div id="tr" class="tp"></div>
</aside>
<div id="map"></div>
<div id="dp"><button class="dpx" onclick="cp()">✕</button><div id="dc"></div></div>

<script>
// ══════════════════════════════════════════════════
// OPERATOR COLORS
// ══════════════════════════════════════════════════
const OC={DKL:'#e8863a',EPD:'#4d96e8',ET:'#3dba54',MPLX:'#a87de8',PAA:'#d4a843',OKE:'#5cc4d4',GEL:'#e86498',USAC:'#8b95a5'};

// ══════════════════════════════════════════════════
// DKL PIPELINE DATA
// ══════════════════════════════════════════════════
const DKL_PIPES=[
{id:'etc',n:'East TX Crude Logistics',path:[[32.77,-94.40],[32.60,-94.80],[32.45,-95.10],[32.35,-95.30]],mi:65,cap:75000,c:'#e8863a',t:'crude',op:'DKL'},
{id:'rr',n:'Red River (JV 33%)',path:[[35.95,-96.75],[35.50,-96.20],[35.00,-95.60],[34.50,-95.20],[34.00,-94.80],[33.50,-94.90],[33.10,-95.00],[32.70,-95.10],[32.50,-94.75]],mi:370,cap:235000,c:'#a87de8',t:'jv',op:'DKL/PAA'},
{id:'mg',n:'Midland Gathering',path:[[32.55,-101.80],[32.45,-101.70],[32.35,-101.55],[32.30,-101.50],[32.25,-101.48]],mi:200,cap:350000,c:'#3dba54',t:'gathering',op:'DKL'},
{id:'bsp',n:'Big Spring-Midland',path:[[32.25,-101.48],[32.15,-101.60],[32.05,-101.80],[32.00,-102.08]],mi:40,cap:50000,c:'#e8863a',t:'crude',op:'DKL'},
{id:'edg',n:'El Dorado/AR Gathering',path:[[33.80,-92.90],[33.60,-92.80],[33.40,-92.70],[33.21,-92.66]],mi:600,cap:80000,c:'#3dba54',t:'gathering',op:'DKL'},
{id:'tp',n:'Tyler Product Pipeline',path:[[32.35,-95.30],[32.50,-95.10],[32.70,-94.90],[33.00,-94.80],[33.16,-94.97]],mi:80,cap:60000,c:'#4d96e8',t:'refined',op:'DKL'},
{id:'edp',n:'El Dorado Product',path:[[33.21,-92.66],[33.50,-92.20],[34.00,-91.50],[34.50,-90.80],[35.15,-90.05]],mi:200,cap:60000,c:'#4d96e8',t:'refined',op:'DKL'},
{id:'w2w',n:'Wink to Webster (JV 15%)',path:[[31.75,-103.16],[31.80,-102.50],[31.99,-102.08],[32.10,-101.50],[32.00,-100.50],[31.60,-99.50],[31.00,-98.50],[30.50,-97.50],[30.00,-96.50],[29.70,-95.80],[29.55,-95.30],[29.54,-95.17]],mi:650,cap:1500000,c:'#a87de8',t:'jv',op:'DKL/XOM'},
{id:'dg',n:'Delaware Basin G&P',path:[[32.50,-104.20],[32.35,-104.00],[32.20,-103.80],[32.10,-103.50],[32.05,-103.30]],mi:300,cap:null,c:'#3dba54',t:'gathering',op:'DKL'},
];

// ══════════════════════════════════════════════════
// COMPETITOR PIPELINE/TERMINAL DATA (major systems in DKL operating area)
// ══════════════════════════════════════════════════
const COMP_PIPES=[
// EPD
{n:'Enterprise Seminole NGL',path:[[32.20,-102.50],[31.80,-101.50],[31.40,-100.50],[31.00,-99.50],[30.60,-98.50],[30.20,-97.50],[29.80,-96.50],[29.60,-95.50],[29.50,-95.00]],c:OC.EPD,op:'EPD',mi:400,t:'NGL'},
{n:'Enterprise Midland Basin',path:[[32.30,-102.20],[32.10,-101.80],[31.99,-101.50],[31.90,-101.20]],c:OC.EPD,op:'EPD',mi:80,t:'crude'},
// ET
{n:'ET Permian Express',path:[[31.90,-102.10],[31.50,-101.00],[31.20,-100.00],[30.80,-99.00],[30.40,-98.00],[30.10,-97.20],[29.80,-96.50],[29.60,-95.50],[29.45,-95.10]],c:OC.ET,op:'ET',mi:500,t:'crude'},
{n:'ET Lone Star NGL',path:[[32.40,-101.60],[32.00,-100.80],[31.50,-99.80],[31.00,-98.80],[30.50,-97.80],[30.00,-97.00]],c:OC.ET,op:'ET',mi:380,t:'NGL'},
// PAA
{n:'Plains Basin Pipeline',path:[[32.00,-102.10],[31.80,-101.50],[31.60,-101.00],[31.40,-100.50],[31.20,-100.00],[31.00,-99.70]],c:OC.PAA,op:'PAA',mi:200,t:'crude'},
{n:'Plains Red River (67%)',path:[[35.95,-96.75],[35.40,-96.10],[34.80,-95.40],[34.20,-95.00],[33.60,-94.90],[33.00,-94.85],[32.50,-94.75]],c:OC.PAA,op:'PAA',mi:370,t:'crude'},
// MPLX
{n:'MPLX Whistler NatGas',path:[[31.75,-103.00],[31.50,-102.20],[31.30,-101.50],[31.10,-100.80],[30.80,-100.00],[30.50,-99.20],[30.20,-98.50]],c:OC.MPLX,op:'MPLX',mi:450,t:'NatGas'},
// OKE
{n:'ONEOK West TX NGL',path:[[32.00,-102.00],[31.70,-101.20],[31.40,-100.40],[31.10,-99.60],[30.80,-99.00]],c:OC.OKE,op:'OKE',mi:300,t:'NGL'},
];

const COMP_TERMS=[
// EPD terminals
{n:'EPD Mont Belvieu',ll:[29.85,-94.90],op:'EPD',type:'NGL Hub',c:OC.EPD},
{n:'EPD Midland Terminal',ll:[31.99,-102.10],op:'EPD',type:'Crude/NGL',c:OC.EPD},
{n:'EPD Houston Ship Channel',ll:[29.73,-95.08],op:'EPD',type:'Export',c:OC.EPD},
{n:'EPD Beaumont Terminal',ll:[30.08,-94.10],op:'EPD',type:'Crude Export',c:OC.EPD},
// ET terminals
{n:'ET Nederland Terminal',ll:[29.97,-94.00],op:'ET',type:'Crude Export',c:OC.ET},
{n:'ET Midland Terminal',ll:[32.05,-102.00],op:'ET',type:'Crude',c:OC.ET},
{n:'ET Houston Terminal',ll:[29.75,-95.20],op:'ET',type:'Refined Products',c:OC.ET},
// PAA
{n:'PAA Cushing Terminal',ll:[35.98,-96.78],op:'PAA',type:'Crude Hub',c:OC.PAA},
{n:'PAA Midland Terminal',ll:[31.95,-102.05],op:'PAA',type:'Crude',c:OC.PAA},
// MPLX
{n:'MPLX Galveston Bay',ll:[29.35,-94.90],op:'MPLX',type:'Refinery Logistics',c:OC.MPLX},
// OKE
{n:'OKE Medford NGL',ll:[36.80,-97.73],op:'OKE',type:'NGL Frac',c:OC.OKE},
{n:'OKE West TX Hub',ll:[31.80,-102.50],op:'OKE',type:'NGL Gathering',c:OC.OKE},
// GEL
{n:'GEL CHOPS Pipeline Hub',ll:[28.90,-89.50],op:'GEL',type:'Offshore GoM',c:OC.GEL},
];

// DKL Terminals
const DKL_TERMS=[
{n:'Tyler Terminal',ll:[32.36,-95.28],type:'Crude & Product',c:OC.DKL},
{n:'El Dorado Terminal',ll:[33.22,-92.64],type:'Crude & Product',c:OC.DKL},
{n:'Memphis Terminal',ll:[35.15,-90.05],type:'Product Dist.',c:OC.DKL},
{n:'Nashville Terminal',ll:[36.16,-86.78],type:'Product Dist.',c:OC.DKL},
{n:'Mt. Pleasant Terminal',ll:[33.16,-94.97],type:'Product Dist.',c:OC.DKL},
{n:'Big Spring Terminal',ll:[32.25,-101.47],type:'Crude Storage',c:OC.DKL},
{n:'N. Little Rock Terminal',ll:[34.77,-92.27],type:'Asphalt/Product',c:OC.DKL},
{n:'Abilene Terminal',ll:[32.45,-99.73],type:'Product Dist.',c:OC.DKL},
{n:'San Angelo Terminal',ll:[31.46,-100.44],type:'Product Dist.',c:OC.DKL},
{n:'Libby 1 Gas Plant',ll:[32.35,-103.90],type:'Gas Processing',c:'#2db88a'},
{n:'Libby 2 Gas Plant',ll:[32.30,-103.95],type:'Gas Processing',c:'#2db88a'},
{n:'H2O Midstream',ll:[32.10,-101.90],type:'Water Midstream',c:'#5cc4d4'},
{n:'Gravity Water',ll:[32.25,-102.30],type:'Water Midstream',c:'#5cc4d4'},
];

// ══════════════════════════════════════════════════
// MAP
// ══════════════════════════════════════════════════
const map=L.map('map',{center:[32,-98],zoom:6,zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OSM © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

function mi(c,s=8,sh='circle'){const h=s+3;
if(sh==='sq')return L.divIcon({className:'',html:'<svg width="'+h+'" height="'+h+'"><rect x="1.5" y="1.5" width="'+s+'" height="'+s+'" rx="2" fill="'+c+'" stroke="#0b0e13" stroke-width="1.5"/></svg>',iconSize:[h,h],iconAnchor:[h/2,h/2]});
if(sh==='di')return L.divIcon({className:'',html:'<svg width="'+h+'" height="'+h+'" viewBox="0 0 '+h+' '+h+'"><rect x="'+(h/2)+'" y="2" width="'+(s*.55)+'" height="'+(s*.55)+'" transform="rotate(45 '+(h/2)+' '+(h/2)+')" fill="'+c+'" stroke="#0b0e13" stroke-width="1.5"/></svg>',iconSize:[h,h],iconAnchor:[h/2,h/2]});
return L.divIcon({className:'',html:'<svg width="'+h+'" height="'+h+'"><circle cx="'+(h/2)+'" cy="'+(h/2)+'" r="'+(s/2)+'" fill="'+c+'" stroke="#0b0e13" stroke-width="1.5"/></svg>',iconSize:[h,h],iconAnchor:[h/2,h/2]});}

const LG={dkl:L.layerGroup().addTo(map),comp:L.layerGroup().addTo(map),padd:L.layerGroup()};

// Draw DKL pipes
DKL_PIPES.forEach(p=>{
LG.dkl.addLayer(L.polyline(p.path,{color:p.c,weight:6,opacity:.08,smoothFactor:1.5}));
const l=L.polyline(p.path,{color:p.c,weight:2.5,opacity:.8,smoothFactor:1.5,dashArray:p.t==='jv'?'7 5':null});
LG.dkl.addLayer(l);
LG.dkl.addLayer(L.polyline(p.path,{color:'#fff',weight:1,opacity:.15,dashArray:'3 22',smoothFactor:1.5,className:'fl'}));
l.bindTooltip('<b>'+p.n+'</b><br>DKL · '+p.mi+' mi'+(p.cap?' · '+p.cap.toLocaleString()+' bpd':''),{sticky:true,className:'ptt'});
l.on('click',function(){openP(p)});
});

// Draw competitor pipes
COMP_PIPES.forEach(p=>{
LG.comp.addLayer(L.polyline(p.path,{color:p.c,weight:5,opacity:.04,smoothFactor:1.5}));
const l=L.polyline(p.path,{color:p.c,weight:1.8,opacity:.5,smoothFactor:1.5,dashArray:'5 4'});
LG.comp.addLayer(l);
l.bindTooltip('<b>'+p.n+'</b><br>'+p.op+' · '+p.mi+' mi · '+p.t,{sticky:true,className:'ptt'});
});

// Draw DKL terminals
